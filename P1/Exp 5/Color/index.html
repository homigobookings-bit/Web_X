<!doctype html>
<html ng-app="myApp">
  <head>
    <title>Background Color Change</title>

    <!-- AngularJS CDN -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

    <script src="app.js"></script>
  </head>

  <body ng-controller="MainController" ng-style="{'background-color': bgColor}">
    <h1>{{title}}</h1>

    <input
      type="text"
      ng-model="bgColor"
      placeholder="Enter color (red, yellow, green)"
    />
  </body>
</html>
